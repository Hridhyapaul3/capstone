<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ crop_name }} Details | AgriMindX</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#1a6b35;--deep:#0d3d1f;--soft:#f4f7f0;--line:#d6e8da;--text:#1a2a1d;--muted:#5a7060}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--soft);color:var(--text);padding:2rem 1rem}
    .wrap{max-width:920px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.2rem}
    .back{color:var(--green);text-decoration:none;font-weight:700}
    .back:hover{text-decoration:underline}
    .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.3rem 1.4rem;margin-bottom:1rem}
    h1{font-family:'Playfair Display',serif;color:var(--deep);font-size:2rem;margin-bottom:.4rem}
    .price{display:inline-block;background:#e7f8ec;color:var(--deep);padding:.45rem .8rem;border-radius:999px;font-weight:700;font-size:.9rem;margin:.5rem 0}
    .season{font-size:.92rem;color:var(--muted);margin-bottom:.8rem}
    h2{font-size:1rem;color:var(--green);margin-bottom:.7rem;text-transform:uppercase;letter-spacing:.06em}
    ol{padding-left:1.2rem;display:grid;gap:.55rem}
    li{line-height:1.6;color:#334539}
    .note{font-size:.86rem;color:var(--muted);line-height:1.55}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="{{ url_for('home') }}">← Back to Home</a>
    </div>

    <div class="card">
      <h1>{{ crop_name }}</h1>
      <div class="price">Market Price (India): {{ market_price.price_range }}</div>
      <div class="season">Source: {{ market_price.source }} | As of: {{ market_price.as_of }}</div>
      <div class="season">Best Season: {{ detail.season }}</div>
    </div>

    <div class="card">
      <h2>General Planting Instructions</h2>
      <ol>
        {% for step in detail.instructions %}
        <li>{{ step }}</li>
        {% endfor %}
      </ol>
    </div>
  </div>
</body>
</html>
